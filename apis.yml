apis:
  - aid: dropzone-ai:platform-integrations
    name: Dropzone AI Platform Integrations
    description: >-
      Dropzone AI's primary "API surface" is its catalog of 90+ outbound
      integrations to SIEM, EDR/XDR, identity, cloud, and threat intel tools.
      The autonomous SOC analyst consumes alerts and enrichment data from these
      systems via their native APIs. No public, customer-facing REST API is
      published; integration is configured during deployment (~30 minutes) and
      documented in the gated docs portal.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
