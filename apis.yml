aid: dropzone-ai
url: https://raw.githubusercontent.com/api-evangelist/dropzone-ai/refs/heads/main/apis.yml
name: Dropzone AI
kind: company
description: >-
  Dropzone AI delivers an Agentic SOC platform built around an autonomous AI SOC
  Analyst that handles tier-1 alert triage and threat hunting 24/7. The platform
  ships pre-trained, is coachable in natural language, and connects via secure
  APIs to 90+ existing security tools (SIEM, EDR/XDR, identity, cloud, threat
  intel). Dropzone does not publish a customer-facing REST API; integration is
  delivered through its outbound connectors and partner program.
